<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>%VITE_NAME%</title>
    <meta name="description" content="%VITE_DESCRIPTION%" />

    <style>
      html {
        background-color: var(--light-bg, #ffffff);
        color: var(--light-text, #1a202c);
        font-family: var(--main-font, sans-serif);
      }

      html.dark {
        background-color: var(--dark-bg, #171923);
        color: var(--dark-text, #ffffffeb);
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .font-heading {
        font-family: var(--display-font, inherit);
      }
    </style>

    <script>
      function reportError(message, stack) {
        const report = {
          message: message,
          stack: stack,
          userAgent: navigator.userAgent,
          href: window.location.href
        }

        fetch('%VITE_API_BASE_URL%/api/error/submit', {
          body: JSON.stringify(report),
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        }).catch((err) => console.error('Failed to report error', err))
      }

      function processAndReportError(error) {
        if (typeof error !== 'object') {
          reportError(JSON.stringify(error), null)
        } else {
          const message = error.message || null
          const stack = error.stack || null
          reportError(message, stack)
        }
      }

      window.addEventListener('unhandledrejection', (error) => processAndReportError(error.reason))
      window.addEventListener('error', (error) => processAndReportError(error.error))
    </script>

    <script>
      ;(function () {
        try {
          const styleJson = localStorage.getItem('persistent-style-setting')
          const theme = localStorage.getItem('theme')
          let isDark = false

          if (styleJson) {
            const style = JSON.parse(styleJson)
            const root = document.documentElement
            root.style.setProperty('--light-bg', style.lightBackgroundColor || '#ffffff')
            root.style.setProperty('--dark-bg', style.darkBackgroundColor || '#171923')
            root.style.setProperty('--light-text', style.lightTextColor || '#1a202c')
            root.style.setProperty('--dark-text', style.darkTextColor || '#ffffffeb')
            root.style.setProperty('--light-branding', style.lightBrandingColor || '#F15A29')
            root.style.setProperty('--dark-branding', style.darkBrandingColor || '#F15A29')
            root.style.setProperty('--light-container-bg', style.lightContainerColor || '#ffffff')
            root.style.setProperty('--dark-container-bg', style.darkContainerColor || '#2d3748')
            root.style.setProperty('--main-font', style.mainFontName || 'inherit')
            root.style.setProperty('--display-font', style.displayFontName || style.mainFontName || 'inherit')

            root.style.setProperty('--light-border', style.lightBorderColor || '#e2e8f0')
            root.style.setProperty('--dark-border', style.darkBorderColor || '#2d3748')
            root.style.setProperty('--light-neutral', style.lightNeutralColor || '#edf2f7')
            root.style.setProperty('--dark-neutral', style.darkNeutralColor || '#2d3748')
            root.style.setProperty('--light-neutral-foreground', style.lightNeutralForeground || style.lightTextColor || '#1a202c')
            root.style.setProperty('--dark-neutral-foreground', style.darkNeutralForeground || style.darkTextColor || '#ffffffeb')
            root.style.setProperty('--light-success', style.lightSuccessColor || '#48bb78')
            root.style.setProperty('--dark-success', style.darkSuccessColor || '#68d391')
            root.style.setProperty('--light-success-foreground', style.lightSuccessForeground || '#ffffff')
            root.style.setProperty('--dark-success-foreground', style.darkSuccessForeground || '#1a202c')
            root.style.setProperty('--light-warning', style.lightWarningColor || '#ecc94b')
            root.style.setProperty('--dark-warning', style.darkWarningColor || '#faf089')
            root.style.setProperty('--light-warning-foreground', style.lightWarningForeground || '#ffffff')
            root.style.setProperty('--dark-warning-foreground', style.darkWarningForeground || '#1a202c')
            root.style.setProperty('--light-danger', style.lightDangerColor || '#f56565')
            root.style.setProperty('--dark-danger', style.darkDangerColor || '#fc8181')
            root.style.setProperty('--light-danger-foreground', style.lightDangerForeground || '#ffffff')
            root.style.setProperty('--dark-danger-foreground', style.darkDangerForeground || '#1a202c')
            root.style.setProperty('--light-info', style.lightInfoColor || '#4299e1')
            root.style.setProperty('--dark-info', style.darkInfoColor || '#63b3ed')
            root.style.setProperty('--light-info-foreground', style.lightInfoForeground || '#ffffff')
            root.style.setProperty('--dark-info-foreground', style.darkInfoForeground || '#1a202c')

            if (style.forceDarkMode) {
              isDark = true
            } else if (style.darkModeEnabled === false) {
              isDark = false
            } else if (theme === 'dark') {
              isDark = true
            } else if (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) {
              isDark = true
            }
          } else {
            if (theme === 'dark') {
              isDark = true
            } else if (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches) {
              isDark = true
            }
          }

          if (isDark) {
            document.documentElement.classList.add('dark')
          } else {
            document.documentElement.classList.remove('dark')
          }
        } catch (e) {}
      })()
    </script>

    <link rel="icon" type="image/png" sizes="192x192" href="%VITE_API_BASE_URL%/cdn/manifest/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="%VITE_API_BASE_URL%/cdn/manifest/icon-256x256.png" />
    <link rel="icon" type="image/png" sizes="384x384" href="%VITE_API_BASE_URL%/cdn/manifest/icon-384x384.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%VITE_API_BASE_URL%/cdn/manifest/icon-512x512.png" />
    <link rel="icon" type="image/x-icon" href="%VITE_API_BASE_URL%/cdn/manifest/favicon.ico" />
    <link rel="manifest" href="%VITE_API_BASE_URL%/manifest/manifest.json" />
    <meta name="theme-color" content="%VITE_THEME_COLOR%" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="%VITE_API_BASE_URL%" />
    <link href="%VITE_API_BASE_URL%/api/app/font-display.css" rel="stylesheet" />
    <link href="%VITE_API_BASE_URL%/api/app/font-main.css" rel="stylesheet" />
    <script defer data-domain="%VITE_PLAUSIBLE_URL%" src="https://visit.kir-dev.hu/js/script.js"></script>

    <script type="module" src="/src/index.tsx"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>

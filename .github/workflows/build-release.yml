name: Build and Push Release Docker Image

on:
  workflow_dispatch: # allow manually running this workflow
  push:
    tags:
      - v*

jobs:
  build-and-push-release:
    name: Build and Push Release Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        with:
          cache-binary: false
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        run: echo ${{ secrets.DOCKER_REGISTRY_PASSWORD }} | docker login -u ${{ secrets.DOCKER_REGISTRY_USERNAME }} --password-stdin ${{ secrets.DOCKER_REGISTRY_URL }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Build OCI Image
        uses: gradle/actions/setup-gradle@v6

      - name: Build OCI Image
        working-directory: backend
        run: ./gradlew clean bootBuildImage --imageName=${{ secrets.DOCKER_REGISTRY_URL }}/cmsch:release

      - name: Tag image with version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }} # if this workflow was triggered by a new tag starting with "v"
        run: docker image tag ${{ secrets.DOCKER_REGISTRY_URL }}/cmsch:release ${{ secrets.DOCKER_REGISTRY_URL }}/cmsch:"$GITHUB_REF_NAME"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Push OCI Image
        run: docker image push --all-tags ${{ secrets.DOCKER_REGISTRY_URL }}/cmsch

      - name: Logout from Docker Registry
        run: docker logout ${{ secrets.DOCKER_REGISTRY_URL }}

  build-and-push-frontend-release:
    name: Build and Push Frontend Release Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          cache-binary: false

      - name: Login to Docker Registry
        run: echo ${{ secrets.DOCKER_REGISTRY_PASSWORD }} | docker login -u ${{ secrets.DOCKER_REGISTRY_USERNAME }} --password-stdin ${{ secrets.DOCKER_REGISTRY_URL }}

      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_REGISTRY_URL }}/cmsch-frontend:release frontend/

      - name: Tag image with version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: docker image tag ${{ secrets.DOCKER_REGISTRY_URL }}/cmsch-frontend:release ${{ secrets.DOCKER_REGISTRY_URL }}/cmsch-frontend:"$GITHUB_REF_NAME"
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Push Frontend Docker Image
        run: docker image push --all-tags ${{ secrets.DOCKER_REGISTRY_URL }}/cmsch-frontend

      - name: Logout from Docker Registry
        run: docker logout ${{ secrets.DOCKER_REGISTRY_URL }}
